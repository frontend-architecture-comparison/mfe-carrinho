<div class="overlay" (click)="onOverlayClick()" aria-hidden="true" *ngIf="open">
  <section
    class="modal"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="title"
    (click)="$event.stopPropagation()"
  >
    <div class="modal-body">
      <ng-content></ng-content>
    </div>
  </section>
</div>
