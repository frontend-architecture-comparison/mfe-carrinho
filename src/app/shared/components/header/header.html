<header>
  <div class="header-left">
    <button class="back-link" type="button" aria-label="Voltar para home" (click)="onHomeClick()" *ngIf="showBack">
      <i class="fa-solid fa-arrow-left" aria-hidden="true"></i>
    </button>

    <h1 *ngIf="title">{{ title }}</h1>
  </div>

  <button class="cart-link" type="button" aria-label="Ir para o carrinho" (click)="onCartClick()">
    <i class="fa-solid fa-cart-shopping" aria-hidden="true"></i>
    <span class="cart-badge" aria-label="Itens no carrinho" *ngIf="cartQuantidade > 0">{{ cartQuantidade }}</span>
  </button>
</header>
